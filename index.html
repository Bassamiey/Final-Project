<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
    <script src="js/app.js"></script>
<body>
    <header>
        <nav>
            <div class="logo">Task Manager</div>
            <div class="nav-links">
                <a href="#home" id="home-link">Home</a>
                <a href="#board" id="board-link">My Board</a>
                <a href="#about" id="about-link">About us</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="home-sect" id="home">
            <h2>Welcome to Your Task Manager</h2>
            <p>Organize your tasks efficiently and boost your productivity.</p>
        </section>
        <section class="board-sec" id="board">
            <div class="board-header">
                <div id="header-left">
                    <h1>Task Manager</h1>
                </div>
                <div id="header-right">
                    <h2>My Board</h2>
                    <span class="task-counter">0 tasks</span>
                </div>
            </div>
            <div class="column" id="col-todo">
                <div class="column-header">
                    <h2>To Do's</h2>
                    <div class="column-actions">
                        <span class="task-counter">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
            <div class="column" id="col-inprogress">
                <div class="column-header">
                    <h2>In Progress</h2>
                    <div class="column-actions">
                        <span class="task-counter">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
            <div class="column" id="col-done">
                <div class="column-header">
                    <h2>Done</h2>
                    <div class="column-actions">
                        <span class="task-counter">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="about-sec" id="about">
            <div>about us</div>
        </section>
    </main>
</body>
</html>
