<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login-page.css">
    <link rel="icon" href="assets/logo/icon.png">
    <script src="js/login.js"></script>
</head>
<body>
    <!-- ginawa kong form yung div mo para submit ay pwede "enter" key sa keyboard -->
     <!-- remain lang yung class kasi need pala sya sa css mo -->
    <form id="loginForm" class="logIn-container">
        <h1>Log In</h1>
        <div class="login-inputs">
            <input type="text" id="login-username" placeholder="Enter Username">
            <input type="password" id="login-password" placeholder="Enter Password">
        </div>
        <div class="login-buttons">
            <!-- ginawa kong type para helper ng form submit -->
             <!-- tinanggal ko rin ang id since yung logic mo lang naman sa login.js is for submit (yung form na ang gagamiting id sa pag submit) -->
            <button type="submit">Login</button>
        </div>
    </form>
</body>
</html>
