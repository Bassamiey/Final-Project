<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login-page.css">
    <link rel="icon" href="assets/logo/icon.png">
    <script src="js/login.js"></script>
</head>
<body>
    <div id="intro-container" class="intro-container">
        <h1 class="animated-text">Welcome to Simple Task Manager System</h1>
        <p>This is our Final project for Web System Technology and Integrated Programming. and we are Group 3.</p>
        <button id="show-login">Login</button>
    </div>

    <form id="loginForm" class="logIn-container hidden">
        <h1>Log In</h1>
        <div class="login-inputs">
            <input type="text" id="login-username" placeholder="Enter Username">
            <input type="password" id="login-password" placeholder="Enter Password">
        </div>
        <div class="login-buttons">
            <button type="submit">Login</button>
        </div>
    </form>
</body>
</html>
