<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Task Manager</div>
            <div class="nav-links">
                <a href="#home" class="nav" id="home-link">Home</a>
                <a href="#board" class="nav" id="board-link">My Board</a>
                <a href="#about" class="nav" id="about-link">About us</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="home-sect" id="home">
            <h2>Welcome to Your Task Manager</h2>
            <p>Organize your tasks efficiently and boost your productivity.</p>
        </section>
        <section class="board-sec" id="board">
            <div class="board-header">
                <div id="header-left">
                    <h1>Task Manager</h1>
                </div>
                <div id="header-right">
                    <h2>My Board</h2>
                    <span class="task-counter" id="total-counter">0 tasks</span>
                </div>
            </div>
            <div class="column" id="col-todo">
                <div class="column-header">
                    <h2>To Do's</h2>
                    <div class="column-actions">
                        <span class="task-counter" id="count-todo">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
            <div class="column" id="col-inprogress">
                <div class="column-header">
                    <h2>In Progress</h2>
                    <div class="column-actions">
                        <span class="task-counter" id="count-inprogress">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
            <div class="column" id="col-done">
                <div class="column-header">
                    <h2>Done</h2>
                    <div class="column-actions">
                        <span class="task-counter" id="count-done">0</span>
                        <button class="btn-add">Add</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="about-sec" id="about">
            <div>about us</div>
        </section>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Add Task</h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <label>Title</label>
                <input type="text" id="modal-title" placeholder="Enter task title..." />
                <label>Description</label>
                <textarea id="modal-desc" placeholder="Enter description (optional)..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancel">Cancel</button>
                <button class="btn-confirm">Add Task</button>
            </div>
        </div>
    </div>

</body>
</html>
